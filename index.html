<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 知识词云</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner"></div>
  </header>

  <main class="layout">
    <section class="detail-section" aria-live="polite">
      <h2 class="section-title">知识点详情</h2>
      <div id="detailPanel" class="detail-panel">
        <div class="detail-empty">
          <p>从右侧词云中选择一个词，查看该知识点的简介与相关词汇。</p>
        </div>
      </div>
    </section>

    <section class="word-cloud-section">
      <div class="word-cloud-header">
        <h1 class="site-title">AI 知识词云</h1>
        <p class="site-subtitle">点击词云中的词，查看解释与相关概念</p>
      </div>
      <h2 class="section-title" aria-hidden="true">&nbsp;</h2>
      <div class="word-cloud-controls">
        <div class="word-cloud-controls-top">
          <span class="cloud-hint">词越大越重要，可点击查看详情</span>
          <input
            id="wordSearch"
            class="word-search-input"
            type="text"
            placeholder="搜索词汇（支持中英文）"
          />
        </div>
        <div class="word-cloud-filters">
          <div class="category-filters">
            <button class="category-filter category-filter--active" data-category="all">全部</button>
            <button class="category-filter" data-category="company">公司</button>
            <button class="category-filter" data-category="model">模型</button>
            <button class="category-filter" data-category="tool">工具</button>
            <button class="category-filter" data-category="assistant">助手</button>
            <button class="category-filter" data-category="concept">概念</button>
            <button class="category-filter" data-category="technique">技术</button>
          </div>
          <button id="toggleImportant" class="toggle-important" type="button">
            只看重点词
          </button>
        </div>
      </div>
      <div id="wordCloudContainer" class="word-cloud" aria-label="AI 知识词云"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p>构建你的 AI 知识地图 · 词云仅为示意，可按需扩展搜索、分类等功能。</p>
  </footer>

  <script src="./scripts/app.js"></script>
</body>
</html>
